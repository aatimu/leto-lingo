<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani Lingo - Letonca Öğren</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#00a2ff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --primary: #00a2ff;
            --primary-dark: #0082cc;
            --bg: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: rgba(0, 0, 0, 0.06);
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --keyboard-bg: rgba(0, 0, 0, 0.03);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            --blur: blur(10px);
            --btn-shadow: 0 4px 6px rgba(0, 0, 0, 0.04);
            --inner-glow: inset 0 2px 4px rgba(255, 255, 255, 0.6);
        }

        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --card-bg: rgba(28, 30, 38, 0.85);
            --text: #f5f6fa;
            --text-light: #95a5a6;
            --border: rgba(255, 255, 255, 0.08);
            --keyboard-bg: rgba(255, 255, 255, 0.03);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            --inner-glow: inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.3s ease;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            max-width: 600px;
            width: 100%;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--card-shadow);
            text-align: center;
            position: relative;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .streak-badge {
            font-weight: 700;
            font-size: 0.95rem;
            background: rgba(255, 94, 87, 0.1);
            color: #ff5e57;
            padding: 6px 14px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .right-controls {
            display: flex;
            gap: 6px;
        }

        .settings-btn {
            padding: 8px 12px;
            font-size: 0.8rem;
            border-radius: 12px;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 700;
            color: var(--text);
            transition: all 0.2s;
        }
        [data-theme="dark"] .settings-btn { background: rgba(255,255,255,0.05); }

        .settings-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .backup-btn {
            background: #2ecc71 !important;
            color: white !important;
            border-color: #2ecc71 !important;
        }

        h1, h2 { margin-top: 35px; font-weight: 800; }
        .subtitle {
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-light);
            margin-bottom: 25px;
            margin-top: 25px;
        }

        .hidden { display: none !important; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }

        button {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: var(--btn-shadow), var(--inner-glow);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        button:active { transform: translateY(1px); }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .topic-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .topic-btn {
            width: 100%;
            text-align: left;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease backwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-pool-btn { border-color: rgba(231, 76, 60, 0.4); background: rgba(231, 76, 60, 0.06); color: var(--error); }
        .error-pool-btn:hover { background: var(--error); color: white; }
        
        /* Karışık Yükle Özel Buton Stili */
        .mix-pool-btn { border-color: rgba(155, 89, 182, 0.4); background: rgba(155, 89, 182, 0.06); color: #9b59b6; }
        .mix-pool-btn:hover { background: #9b59b6; color: white; border-color: #9b59b6; }

        .topic-score { font-size: 0.85rem; background: rgba(0,0,0,0.04); padding: 6px 12px; border-radius: 10px; color: var(--text-light); }
        [data-theme="dark"] .topic-score { background: rgba(255,255,255,0.04); }

        .progress-bar { height: 14px; width: 100%; background: rgba(0,0,0,0.04); border-radius: 50px; overflow: hidden; margin-bottom: 30px; margin-top: 25px; }
        [data-theme="dark"] .progress-bar { background: rgba(255,255,255,0.05); }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #56ccf2, #2f80ed);
            width: 0%;
            border-radius: 50px;
            transition: width 0.4s ease;
        }

        .question-box { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: var(--text-light); }
        .hint-box { font-size: 1.6rem; font-weight: 800; margin-bottom: 30px; color: var(--text); }

        .input-container { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 16px; font-size: 1.15rem; font-weight: 600;
            border: 2px solid var(--border); border-radius: 16px;
            background: var(--card-bg); color: var(--text); text-align: center;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }
        .hint-action-btn { padding: 0 18px; font-size: 1.3rem; border-radius: 16px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 25px; }
        .option-btn { width: 100%; padding: 18px; text-align: center; }
        .option-btn:hover { background: rgba(0, 162, 255, 0.08); }

        .lv-keyboard { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 25px; background: var(--keyboard-bg); padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
        .kb-btn { padding: 10px 14px; font-size: 1.1rem; font-weight: 700; min-width: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); }

        .feedback { margin-top: 20px; font-weight: 700; font-size: 1.2rem; min-height: 28px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }
        .feedback.warning { color: var(--warning); }

        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .result-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(0, 162, 255, 0.1); color: var(--primary); font-size: 2rem; font-weight: 800; display: flex; justify-content: center; align-items: center; margin: 20px auto; border: 3px solid var(--primary); }
        .confetti { position: absolute; width: 8px; height: 8px; top: -10px; border-radius: 50%; animation: confettiDrop 2.5s ease-out infinite; z-index: 10; }
        @keyframes confettiDrop {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div class="top-bar">
        <div id="streak-display" class="streak-badge">🔥 0 Gün</div>
        <div class="right-controls">
            <button class="settings-btn backup-btn" onclick="exportData()" title="Verileri Yedekle">📥</button>
            <button class="settings-btn backup-btn" onclick="document.getElementById('import-input').click()" title="Yedeği Yükle" style="background:#3498db !important; border-color:#3498db !important;">📤</button>
            <input type="file" id="import-input" class="hidden" onchange="importData(event)" accept=".json">
            <button id="toggle-theme" class="settings-btn" onclick="toggleTheme()">🌙 Mod</button>
            <button id="toggle-sfx" class="settings-btn active" onclick="toggleSetting('sfx')">🎵 Sesler</button>
        </div>
    </div>

    <div id="loading-container">
        <h2>Mani Lingo</h2>
        <p>Veri havuzu yükleniyor...</p>
    </div>

    <div id="setup-container" class="hidden">
        <h1>Mani Lingo</h1>
        
        <div class="subtitle">1. Öğrenme Dili Seçimi</div>
        <div class="btn-group">
            <button id="btn-tr" class="lang-btn" onclick="setLangMode('tr')">Türkçe</button>
            <button id="btn-en" class="lang-btn" onclick="setLangMode('en')">English</button>
            <button id="btn-both" class="lang-btn" onclick="setLangMode('both')">English (Türkçe)</button>
        </div>

        <div class="subtitle">2. Konu Seçimi</div>
        <div id="topics-container" class="topic-list"></div>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question" class="question-box"></div>
        <div id="hint" class="hint-box"></div>
        
        <div id="options-container" class="options-grid hidden"></div>

        <div id="input-area" class="input-container hidden">
            <input type="text" id="answer-input" placeholder="Cevabınızı yazın..." autocomplete="off">
            <button id="hint-btn" class="hint-action-btn" onclick="revealLetterHint()">💡</button>
        </div>
        
        <div id="keyboard-container" class="lv-keyboard hidden"></div>
        
        <div class="btn-group" style="margin-top: 20px;">
            <button id="submit-btn" onclick="checkTextAnswer()" style="background: var(--primary); color: white; border: none;" class="hidden">Kontrol Et</button>
            <button onclick="exitQuiz()" style="background: rgba(0,0,0,0.04); border: none;">Çıkış</button>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="result-container" class="hidden">
        <h2>Muhteşem Başarı! 🎉</h2>
        <div class="result-circle" id="result-circle-box">0%</div>
        <p id="score-text" style="font-size: 1.1rem; font-weight: 600; margin-bottom: 25px;"></p>
        <button onclick="showSetupScreen()" style="background: var(--primary); color: white; border: none;">Ana Menüye Dön</button>
    </div>
</div>

<script>
    const topicTranslations = {
        'Selamlaşma ve Tanışma': { tr: 'Selamlaşma ve Tanışma', en: 'Greetings and Introductions', both: 'Greetings and Introductions (Selamlaşma ve Tanışma)' },
        'Meslekler ve Günlük Hayat': { tr: 'Meslekler ve Günlük Hayat', en: 'Occupations and Daily Life', both: 'Occupations and Daily Life (Meslekler ve Günlük Hayat)' },
        'Sayılar ve İletişim': { tr: 'Sayılar ve İletişim', en: 'Numbers and Communication', both: 'Numbers and Communication (Sayılar ve İletişim)' }
    };

    const lvLetters = ['ā', 'č', 'ē', 'ģ', 'ī', 'ķ', 'ļ', 'ņ', 'š', 'ū', 'ž'];

    let vocabularyDatabase = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedLangMode = 'tr';
    let currentTopicKey = '';
    let hintCount = 0;
    let isSpecialMode = false; // Hata veya Karışık havuzları ayrımı için

    let settings = { sfx: localStorage.getItem('ml_sfx') !== 'false' };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!settings.sfx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'error') {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.setValueAtTime(147, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('ml_theme', newTheme);
        document.getElementById('toggle-theme').innerText = newTheme === 'dark' ? "☀️ Mod" : "🌙 Mod";
    }

    function toggleSetting(key) {
        settings[key] = !settings[key];
        localStorage.setItem(`ml_${key}`, settings[key]);
        document.getElementById(`toggle-${key}`).classList.toggle('active', settings[key]);
    }

    // 💾 3. MADDE: Verileri Dışa Aktar (Yedekle)
    function exportData() {
        let backup = {};
        for(let i=0; i<localStorage.length; i++) {
            let key = localStorage.key(i);
            if(key.startsWith('mani_') || key.startsWith('ml_')) {
                backup[key] = localStorage.getItem(key);
            }
        }
        const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `mani_lingo_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    // 💾 3. MADDE: Verileri Geri Yükle (Yedeği Aç)
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
                alert("Yedek başarıyla yüklendi! Sayfa yenileniyor...");
                location.reload();
            } catch(err) {
                alert("Hata: Geçersiz yedek dosyası!");
            }
        };
        reader.readAsText(file);
    }

    function updateStreak(isQuizFinished = false) {
        const today = new Date().toDateString();
        const lastVisit = localStorage.getItem('ml_last_visit');
        let streak = parseInt(localStorage.getItem('ml_streak') || '0');

        if (!lastVisit) {
            if (isQuizFinished) streak = 1;
        } else {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastVisit === yesterday.toDateString()) {
                if (isQuizFinished) streak += 1;
            } else if (lastVisit !== today) {
                if (isQuizFinished) streak = isQuizFinished ? 1 : 0;
            }
        }

        if (isQuizFinished) {
            localStorage.setItem('ml_last_visit', today);
            localStorage.setItem('ml_streak', streak);
        }
        document.getElementById('streak-display').innerText = `🔥 ${streak} Gün`;
    }

    function triggerConfetti() {
        const card = document.getElementById("main-card");
        const colors = ['#f2d74e', '#95c3de', '#e94a3f', '#3fe979', '#a93fe9'];
        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * card.offsetWidth + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDelay = Math.random() * 0.5 + 's';
            confetti.style.width = Math.random() * 6 + 6 + 'px';
            confetti.style.height = confetti.style.width;
            card.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2500);
        }
    }

    async function loadDatabase() {
        try {
            const response = await fetch('./questions.json');
            if (!response.ok) throw new Error("Veri dosyası bulunamadı");
            vocabularyDatabase = await response.json();
            
            if (localStorage.getItem('ml_theme') === 'dark') toggleTheme();
            if (localStorage.getItem('mani_lingo_lang')) selectedLangMode = localStorage.getItem('mani_lingo_lang');
            document.getElementById('toggle-sfx').classList.toggle('active', settings.sfx);
            
            updateStreak();
            showSetupScreen();
        } catch (error) {
            document.getElementById("loading-container").innerText = "Hata: Veri yüklenemedi!";
        }
    }

    document.addEventListener("DOMContentLoaded", loadDatabase);

    function showSetupScreen() {
        document.getElementById("quiz-container").classList.add("hidden");
        document.getElementById("result-container").classList.add("hidden");
        document.getElementById("setup-container").classList.remove("hidden");
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${selectedLangMode}`);
        if(activeBtn) activeBtn.classList.add('active');

        renderTopics();
    }

    function setLangMode(mode) {
        selectedLangMode = mode;
        localStorage.setItem('mani_lingo_lang', mode);
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        renderTopics();
    }

    function renderTopics() {
        const container = document.getElementById("topics-container");
        if (!container) return;
        container.innerHTML = ""; 

        // 1. Hata Sepeti Butonu
        const errorPool = JSON.parse(localStorage.getItem('ml_errors') || '[]');
        if (errorPool.length > 0) {
            const errBtn = document.createElement("button");
            errBtn.className = "topic-btn error-pool-btn";
            errBtn.innerHTML = `<span>🚨 Yanlış Yaptığım Sorular</span> <span class="topic-score">${errorPool.length} Soru</span>`;
            errBtn.onclick = () => startTopic('__errors__');
            container.appendChild(errBtn);
        }

        // 2. Normal Konu Butonları
        const uniqueTopics = [...new Set(vocabularyDatabase.map(q => q.topic))];
        uniqueTopics.forEach((topicKey, index) => {
            let buttonText = topicKey;
            if (topicTranslations[topicKey]) buttonText = topicTranslations[topicKey][selectedLangMode];

            const button = document.createElement("button");
            button.className = "topic-btn";
            button.style.animationDelay = `${(index + 1) * 0.05}s`;
            button.innerHTML = `<span>${buttonText}</span>`;

            const savedScoreData = localStorage.getItem(`mani_score_${topicKey}`);
            if (savedScoreData) button.innerHTML += `<span class="topic-score">Rekor: ${savedScoreData}</span>`;

            button.onclick = () => startTopic(topicKey);
            container.appendChild(button);
        });

        // 🎯 İSTEK: Karışık Yükle Modu Butonu (En altta)
        const mixBtn = document.createElement("button");
        mixBtn.className = "topic-btn mix-pool-btn";
        mixBtn.style.animationDelay = `${(uniqueTopics.length + 1) * 0.05}s`;
        mixBtn.innerHTML = `<span>🎲 Karışık Yükle (Mix Modu)</span>`;
        
        const savedMixScore = localStorage.getItem('mani_score___mix__');
        if (savedMixScore) mixBtn.innerHTML += `<span class="topic-score">Rekor: ${savedMixScore}</span>`;
        
        mixBtn.onclick = () => startTopic('__mix__');
        container.appendChild(mixBtn);
    }

    function startTopic(selectedTopic) {
        currentTopicKey = selectedTopic;
        let allTopicQuestions = [];

        if (selectedTopic === '__errors__') {
            allTopicQuestions = JSON.parse(localStorage.getItem('ml_errors') || '[]');
            isSpecialMode = true;
        } else if (selectedTopic === '__mix__') {
            // 🎯 İSTEK: Bütün veri tabanını çorba yapıp karmaya alıyoruz
            allTopicQuestions = [...vocabularyDatabase];
            isSpecialMode = true;
        } else {
            allTopicQuestions = vocabularyDatabase.filter(q => q.topic === selectedTopic);
            isSpecialMode = false;
        }
        
        if (allTopicQuestions.length === 0) return;

        allTopicQuestions.sort(() => Math.random() - 0.5);
        currentQuestions = allTopicQuestions.slice(0, 25);
        
        currentIndex = 0;
        score = 0;

        document.getElementById("setup-container").classList.add("hidden");
        document.getElementById("quiz-container").classList.remove("hidden");
        
        buildKeyboard();
        showQuestion();
    }

    function buildKeyboard() {
        const kbContainer = document.getElementById("keyboard-container");
        kbContainer.innerHTML = "";
        lvLetters.forEach(letter => {
            const btn = document.createElement("button");
            btn.className = "kb-btn";
            btn.innerText = letter;
            btn.onclick = () => {
                const input = document.getElementById("answer-input");
                input.value += letter; input.focus();
            };
            kbContainer.appendChild(btn);
        });
    }

    function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
            finishQuiz();
            return;
        }

        const q = currentQuestions[currentIndex];
        const inputArea = document.getElementById("input-area");
        const inputField = document.getElementById("answer-input");
        const submitBtn = document.getElementById("submit-btn");
        const optionsContainer = document.getElementById("options-container");
        const kbContainer = document.getElementById("keyboard-container");
        const hintField = document.getElementById("hint");
        
        document.getElementById("feedback").innerText = "";
        hintCount = 0;

        const progressPercent = (currentIndex / currentQuestions.length) * 100;
        document.getElementById("progress").style.width = `${progressPercent}%`;

        let meaningText = "";
        if (selectedLangMode === 'tr') meaningText = `Meaning: ${q.tr}`;
        else if (selectedLangMode === 'en') meaningText = `Meaning: ${q.en}`;
        else meaningText = `Meaning: ${q.en} (${q.tr})`;

        hintField.innerText = meaningText;

        if (q.type === 'word') {
            document.getElementById("question").innerText = `Doğru Letonca kelimeyi seçin:`;
            document.getElementById("question").style.fontSize = "1.1rem";
            document.getElementById("question").style.color = "var(--text-light)";
            
            inputArea.classList.add("hidden");
            submitBtn.classList.add("hidden");
            kbContainer.classList.add("hidden");
            optionsContainer.classList.remove("hidden");
            generateOptions(q);
        } else {
            document.getElementById("question").style.fontSize = "1.5rem";
            document.getElementById("question").style.color = "var(--text)";
            
            optionsContainer.classList.add("hidden");
            inputArea.classList.remove("hidden");
            submitBtn.classList.remove("hidden");
            kbContainer.classList.remove("hidden");
            
            inputField.value = "";
            inputField.focus();
            
            if (q.type === 'sentence') {
                document.getElementById("question").innerText = q.questionPattern;
                inputField.placeholder = "Boşluğu doldurun...";
            } else {
                document.getElementById("question").innerText = `Bu ifadeyi Letonca yazın:`;
                inputField.placeholder = "Cümleyi yazın...";
            }

            inputField.onkeypress = function(e) { if (e.key === 'Enter') checkTextAnswer(); };
        }
    }

    function revealLetterHint() {
        const q = currentQuestions[currentIndex];
        const correctAnswer = (q.type === 'sentence' ? q.answer : q.lv);
        const inputField = document.getElementById("answer-input");
        if (hintCount < correctAnswer.length) {
            hintCount++;
            inputField.value = correctAnswer.substring(0, hintCount);
            inputField.focus();
        }
    }

    function generateOptions(correctQuestion) {
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        let pool = vocabularyDatabase.filter(item => item.type === 'word' && item.lv !== correctQuestion.lv);
        pool.sort(() => Math.random() - 0.5);
        let choices = pool.slice(0, 3).map(item => item.lv);
        choices.push(correctQuestion.lv);
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choiceText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = choiceText;
            btn.onclick = () => verifyAnswer(choiceText, correctQuestion);
            optionsContainer.appendChild(btn);
        });
    }

    function cleanAksan(str) {
        return str.replace(/ā/g, 'a').replace(/č/g, 'c').replace(/ē/g, 'e')
                  .replace(/ģ/g, 'g').replace(/ī/g, 'i').replace(/ķ/g, 'k')
                  .replace(/ļ/g, 'l').replace(/ņ/g, 'n').replace(/š/g, 's')
                  .replace(/ū/g, 'u').replace(/ž/g, 'z');
    }

    function handleErrorsPool(question, isCorrect) {
        let errorPool = JSON.parse(localStorage.getItem('ml_errors') || '[]');
        if (isCorrect) {
            errorPool = errorPool.filter(item => !(item.lv === question.lv && item.topic === question.topic));
        } else {
            const exist = errorPool.some(item => item.lv === question.lv && item.topic === question.topic);
            if (!exist) errorPool.push(question);
        }
        localStorage.setItem('ml_errors', JSON.stringify(errorPool));
    }

    function verifyAnswer(selected, qObj) {
        const feedbackField = document.getElementById("feedback");
        const card = document.getElementById("main-card");
        if (selected.toLowerCase() === qObj.lv.toLowerCase()) {
            score++; playSound('success');
            feedbackField.className = "feedback success";
            feedbackField.innerText = "Pareizi! (Doğru) 🌟";
            handleErrorsPool(qObj, true);
        } else {
            playSound('error'); card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            feedbackField.className = "feedback error";
            feedbackField.innerText = `Nepareizi! Doğru cevap: ${qObj.lv}`;
            handleErrorsPool(qObj, false);
        }
        currentIndex++; setTimeout(showQuestion, 1600);
    }

    function checkTextAnswer() {
        const q = currentQuestions[currentIndex];
        const userInput = document.getElementById("answer-input").value.trim().toLowerCase();
        const correctAnswer = (q.type === 'sentence' ? q.answer : q.lv).trim().toLowerCase();
        const feedbackField = document.getElementById("feedback");
        const card = document.getElementById("main-card");

        if (userInput === correctAnswer) {
            score += (hintCount > 0) ? 0.5 : 1;
            playSound('success');
            feedbackField.className = "feedback success";
            feedbackField.innerText = (hintCount > 0) ? "Doğru (İpucu kullanıldı 💡)" : "Pareizi! (Doğru) 🌟";
            handleErrorsPool(q, true);
        } else if (cleanAksan(userInput) === cleanAksan(correctAnswer)) {
            score += (hintCount > 0) ? 0.5 : 1;
            playSound('success');
            feedbackField.className = "feedback warning";
            feedbackField.innerText = `Neredeyse doğru! İşaretlere dikkat: ${correctAnswer} ✍️`;
            handleErrorsPool(q, true);
        } else {
            playSound('error'); card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            feedbackField.className = "feedback error";
            feedbackField.innerText = `Nepareizi! Doğru cevap: ${correctAnswer}`;
            handleErrorsPool(q, false);
        }
        currentIndex++; setTimeout(showQuestion, 2000);
    }

    function finishQuiz() {
        document.getElementById("quiz-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");
        
        const successPercentage = Math.round((score / currentQuestions.length) * 100);
        document.getElementById("result-circle-box").innerText = `${successPercentage}%`;
        document.getElementById("score-text").innerText = `${currentQuestions.length} soru içerisinden ${score} puan topladınız!`;

        // Skor kaydetme (Hata havuzu hariç, Karma havuz dahil rekor tutar)
        if (currentTopicKey !== '__errors__') {
            const currentScoreString = `${score}/${currentQuestions.length}`;
            const existingRecord = localStorage.getItem(`mani_score_${currentTopicKey}`);
            if (existingRecord) {
                const oldCorrect = parseFloat(existingRecord.split('/')[0]);
                if (score > oldCorrect) localStorage.setItem(`mani_score_${currentTopicKey}`, currentScoreString);
            } else {
                localStorage.setItem(`mani_score_${currentTopicKey}`, currentScoreString);
            }
        }
        
        if (successPercentage === 100) triggerConfetti();
        updateStreak(true);
    }

    function exitQuiz() {
        if (confirm("Testten çıkmak istediğinize emin misiniz?")) showSetupScreen();
    }
</script>
