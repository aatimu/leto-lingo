<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani Lingo - Letonca Öğren</title>
    <style>
        :root {
            --primary: #00a2ff;
            --primary-dark: #0082cc;
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
            --keyboard-bg: #f0f2f5;
        }

        /* 🌙 Dark Mode Renk Değişkenleri */
        [data-theme="dark"] {
            --bg: #121214;
            --card-bg: #1a1a1e;
            --text: #e1e1e6;
            --text-light: #a4a4a8;
            --border: #29292e;
            --keyboard-bg: #202024;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            transition: background 0.3s;
        }

        /* Üst Kontrol Paneli */
        .top-bar {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .streak-badge {
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .right-controls {
            display: flex;
            gap: 8px;
        }

        .settings-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            background: #eee;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #333;
        }
        [data-theme="dark"] .settings-btn {
            background: #29292e;
            color: #e1e1e6;
        }

        .settings-btn.active {
            background: var(--primary);
            color: white;
        }

        h1, h2 {
            margin-top: 20px;
            color: var(--text);
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-light);
            margin-bottom: 20px;
            margin-top: 20px;
        }

        .hidden { display: none !important; }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            border-color: var(--primary);
            background: rgba(0, 162, 255, 0.05);
        }

        .lang-btn.active {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 162, 255, 0.3);
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .topic-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .error-pool-btn {
            border-color: var(--error);
            background: rgba(231, 76, 60, 0.05);
            font-weight: bold;
        }
        .error-pool-btn:hover {
            background: var(--error);
            color: white;
        }

        .topic-score {
            font-size: 0.85rem;
            background: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-light);
            font-weight: bold;
        }
        [data-theme="dark"] .topic-score {
            background: rgba(255,255,255,0.05);
        }

        .progress-bar {
            height: 8px;
            width: 100%;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 25px;
            margin-top: 20px;
        }
        [data-theme="dark"] .progress-bar { background: #29292e; }

        .progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text);
        }

       .hint-box {
            font-size: 1.4rem; /* Boyutu soru fontu seviyesine çıkardık */
            font-weight: 700;  /* Tamamen kalın (bold) yaptık */
            margin-bottom: 25px;
            color: var(--text); /* Rengini ana metin rengine eşitledik */
        }

        .input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
            box-sizing: border-box;
            text-align: center;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .hint-action-btn {
            padding: 0 15px;
            font-size: 1.2rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 15px;
            text-align: center;
        }

        .lv-keyboard {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: var(--keyboard-bg);
            padding: 10px;
            border-radius: 12px;
        }

        .kb-btn {
            padding: 8px 12px;
            font-size: 1.1rem;
            min-width: 35px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
        }

        .feedback {
            margin-top: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            min-height: 24px;
        }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--error); }
        .feedback.warning { color: var(--warning); }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <!-- Üst Kontrol ve Bilgi Çubuğu -->
    <div class="top-bar">
        <div id="streak-display" class="streak-badge" title="Günlük Çalışma Serisi">🔥 0 Gün</div>
        <div class="right-controls">
            <button id="toggle-theme" class="settings-btn" onclick="toggleTheme()">🌙 Mod</button>
            <button id="toggle-sfx" class="settings-btn active" onclick="toggleSetting('sfx')">🎵 Sesler</button>
        </div>
    </div>

    <!-- 1. YÜKLENİYOR EKRANI -->
    <div id="loading-container">
        <h2>Mani Lingo</h2>
        <p>Veri havuzu yükleniyor...</p>
    </div>

    <!-- 2. KURULUM / SEÇİM EKRANI -->
    <div id="setup-container" class="hidden">
        <h1>Mani Lingo Setup</h1>
        
        <div class="subtitle">1. Öğrenme Dili Seçimi</div>
        <div class="btn-group">
            <button id="btn-tr" class="lang-btn" onclick="setLangMode('tr')">Türkçe</button>
            <button id="btn-en" class="lang-btn" onclick="setLangMode('en')">English</button>
            <button id="btn-both" class="lang-btn" onclick="setLangMode('both')">English (Türkçe)</button>
        </div>

        <div class="subtitle">2. Konu Seçimi</div>
        <div id="topics-container" class="topic-list"></div>
    </div>

    <!-- 3. QUIZ EKRANI -->
    <div id="quiz-container" class="hidden">
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
        <div id="question" class="question-box"></div>
        <div id="hint" class="hint-box"></div>
        
        <!-- Çoktan Seçmeli Alanı -->
        <div id="options-container" class="options-grid hidden"></div>

        <!-- Metin Giriş Alanı + İpucu Butonu -->
        <div id="input-area" class="input-container hidden">
            <input type="text" id="answer-input" placeholder="Cevabınızı yazın..." autocomplete="off">
            <button id="hint-btn" class="hint-action-btn" onclick="revealLetterHint()" title="Harf İpucu Al">💡</button>
        </div>
        
        <!-- Letonca Klavye Alanı -->
        <div id="keyboard-container" class="lv-keyboard hidden"></div>
        
        <div class="btn-group">
            <button id="submit-btn" onclick="checkTextAnswer()" style="background: var(--primary); color: white; border: none;" class="hidden">Kontrol Et</button>
            <button onclick="exitQuiz()" style="background: #eee; border: none;">Çıkış</button>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <!-- 4. SONUÇ EKRANI -->
    <div id="result-container" class="hidden">
        <h2>Tebrikler! 🎉</h2>
        <p id="score-text"></p>
        <button onclick="showSetupScreen()" style="background: var(--primary); color: white; border: none;">Ana Menüye Dön</button>
    </div>
</div>

<script>
    const topicTranslations = {
        'Selamlaşma ve Tanışma': { tr: 'Selamlaşma ve Tanışma', en: 'Greetings and Introductions', both: 'Greetings and Introductions (Selamlaşma ve Tanışma)' },
        'Meslekler ve Günlük Hayat': { tr: 'Meslekler ve Günlük Hayat', en: 'Occupations and Daily Life', both: 'Occupations and Daily Life (Meslekler ve Günlük Hayat)' },
        'Sayılar ve İletişim': { tr: 'Sayılar ve İletişim', en: 'Numbers and Communication', both: 'Numbers and Communication (Sayılar ve İletişim)' }
    };

    const lvLetters = ['ā', 'č', 'ē', 'ģ', 'ī', 'ķ', 'ļ', 'ņ', 'š', 'ū', 'ž'];

    let vocabularyDatabase = [];
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let selectedLangMode = 'tr';
    let currentTopicKey = '';
    let hintCount = 0; // Harf ipucu sayacı
    let isErrorMode = false; // Hata havuzu aktif mi?

    let settings = { sfx: localStorage.getItem('ml_sfx') !== 'false' };

    // 🎵 Ses Efektleri (Bip sesleri)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!settings.sfx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'error') {
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            osc.frequency.setValueAtTime(165, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // 🌙 Tema Değiştirme (Dark Mode)
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('ml_theme', newTheme);
        document.getElementById('toggle-theme').innerText = newTheme === 'dark' ? "☀️ Mod" : "🌙 Mod";
    }

    // Ses ayarı açma/kapama
    function toggleSetting(key) {
        settings[key] = !settings[key];
        localStorage.setItem(`ml_${key}`, settings[key]);
        const btn = document.getElementById(`toggle-${key}`);
        btn.classList.toggle('active', settings[key]);
    }

    // 🔥 Streak (Günlük Seri) Algoritması
    function updateStreak(isQuizFinished = false) {
        const today = new Date().toDateString();
        const lastVisit = localStorage.getItem('ml_last_visit');
        let streak = parseInt(localStorage.getItem('ml_streak') || '0');

        if (!lastVisit) {
            if (isQuizFinished) streak = 1;
        } else {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (lastVisit === yesterday.toDateString()) {
                if (isQuizFinished) streak += 1;
            } else if (lastVisit !== today) {
                if (isQuizFinished) streak = 1; else streak = 0; // Gün atlandıysa sıfırla
            }
        }

        if (isQuizFinished) {
            localStorage.setItem('ml_last_visit', today);
            localStorage.setItem('ml_streak', streak);
        }
        document.getElementById('streak-display').innerText = `🔥 ${streak} Gün`;
    }

    async function loadDatabase() {
        try {
            const response = await fetch('./questions.json');
            if (!response.ok) throw new Error("Veri dosyası bulunamadı");
            vocabularyDatabase = await response.json();
            
            // Ayarları yükle
            if (localStorage.getItem('ml_theme') === 'dark') toggleTheme();
            if (localStorage.getItem('mani_lingo_lang')) selectedLangMode = localStorage.getItem('mani_lingo_lang');
            document.getElementById('toggle-sfx').classList.toggle('active', settings.sfx);
            
            updateStreak(); // Girişte seriyi kontrol et
            showSetupScreen();
        } catch (error) {
            document.getElementById("loading-container").innerText = "Hata: Veri yüklenemedi!";
            console.error(error);
        }
    }

    document.addEventListener("DOMContentLoaded", loadDatabase);

    function showSetupScreen() {
        document.getElementById("quiz-container").classList.add("hidden");
        document.getElementById("result-container").classList.add("hidden");
        document.getElementById("setup-container").classList.remove("hidden");
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${selectedLangMode}`);
        if(activeBtn) activeBtn.classList.add('active');

        renderTopics();
    }

    function setLangMode(mode) {
        selectedLangMode = mode;
        localStorage.setItem('mani_lingo_lang', mode);
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        renderTopics();
    }

    function renderTopics() {
        const container = document.getElementById("topics-container");
        if (!container) return;
        container.innerHTML = ""; 

        // 🟥 1. MADDE: Yanlış yapılan sorular sepeti butonu
        const errorPool = JSON.parse(localStorage.getItem('ml_errors') || '[]');
        if (errorPool.length > 0) {
            const errBtn = document.createElement("button");
            errBtn.className = "topic-btn error-pool-btn";
            errBtn.innerHTML = `<span>🚨 Yanlış Yaptığım Sorularla Pratik Yap</span> <span class="topic-score">${errorPool.length} Soru</span>`;
            errBtn.onclick = () => startTopic('__errors__');
            container.appendChild(errBtn);
        }

        const uniqueTopics = [...new Set(vocabularyDatabase.map(q => q.topic))];
        uniqueTopics.forEach(topicKey => {
            let buttonText = topicKey;
            if (topicTranslations[topicKey]) buttonText = topicTranslations[topicKey][selectedLangMode];

            const button = document.createElement("button");
            button.className = "topic-btn";
            button.innerHTML = `<span>${buttonText}</span>`;

            const savedScoreData = localStorage.getItem(`mani_score_${topicKey}`);
            if (savedScoreData) {
                button.innerHTML += `<span class="topic-score">Rekor: ${savedScoreData}</span>`;
            }

            button.onclick = () => startTopic(topicKey);
            container.appendChild(button);
        });
    }

    function startTopic(selectedTopic) {
        currentTopicKey = selectedTopic;
        let allTopicQuestions = [];

        if (selectedTopic === '__errors__') {
            allTopicQuestions = JSON.parse(localStorage.getItem('ml_errors') || '[]');
            isErrorMode = true;
        } else {
            allTopicQuestions = vocabularyDatabase.filter(q => q.topic === selectedTopic);
            isErrorMode = false;
        }
        
        if (allTopicQuestions.length === 0) return;

        allTopicQuestions.sort(() => Math.random() - 0.5);
        currentQuestions = allTopicQuestions.slice(0, 25);
        
        currentIndex = 0;
        score = 0;

        document.getElementById("setup-container").classList.add("hidden");
        document.getElementById("quiz-container").classList.remove("hidden");
        
        buildKeyboard();
        showQuestion();
    }

    function buildKeyboard() {
        const kbContainer = document.getElementById("keyboard-container");
        kbContainer.innerHTML = "";
        lvLetters.forEach(letter => {
            const btn = document.createElement("button");
            btn.className = "kb-btn";
            btn.innerText = letter;
            btn.onclick = () => {
                const input = document.getElementById("answer-input");
                input.value += letter; input.focus();
            };
            kbContainer.appendChild(btn);
        });
    }

    function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
            finishQuiz();
            return;
        }

        const q = currentQuestions[currentIndex];
        const inputArea = document.getElementById("input-area");
        const inputField = document.getElementById("answer-input");
        const submitBtn = document.getElementById("submit-btn");
        const optionsContainer = document.getElementById("options-container");
        const kbContainer = document.getElementById("keyboard-container");
        const hintField = document.getElementById("hint");
        
        document.getElementById("feedback").innerText = "";
        hintCount = 0;

        const progressPercent = (currentIndex / currentQuestions.length) * 100;
        document.getElementById("progress").style.width = `${progressPercent}%`;

        // İpucu Dili Metni Oluşturma
        let meaningText = "";
        if (selectedLangMode === 'tr') meaningText = `Meaning: ${q.tr}`;
        else if (selectedLangMode === 'en') meaningText = `Meaning: ${q.en}`;
        else meaningText = `Meaning: ${q.en} (${q.tr})`;

        hintField.innerText = meaningText;

        if (q.type === 'word') {
            // 🎯 Çoktan Seçmeli Test Modu
            document.getElementById("question").innerText = `Doğru Letonca kelimeyi seçin:`;
            // Soru başlığını biraz küçültüp anlam alanını ön plana çıkarıyoruz
            document.getElementById("question").style.fontSize = "1.1rem";
            document.getElementById("question").style.color = "var(--text-light)";
            
            inputArea.classList.add("hidden");
            submitBtn.classList.add("hidden");
            kbContainer.classList.add("hidden");
            optionsContainer.classList.remove("hidden");
            generateOptions(q);
        } else {
            // 🎯 Yazma Modları (Sentence / Translate)
            document.getElementById("question").style.fontSize = "1.4rem";
            document.getElementById("question").style.color = "var(--text)";
            
            optionsContainer.classList.add("hidden");
            inputArea.classList.remove("hidden");
            submitBtn.classList.remove("hidden");
            kbContainer.classList.remove("hidden");
            
            inputField.value = "";
            inputField.focus();
            
            if (q.type === 'sentence') {
                document.getElementById("question").innerText = q.questionPattern;
                inputField.placeholder = "Boşluğu doldurun...";
            } else {
                document.getElementById("question").innerText = `Bu ifadeyi Letonca yazın:`;
                inputField.placeholder = "Cümleyi yazın...";
            }

            inputField.onkeypress = function(e) { if (e.key === 'Enter') checkTextAnswer(); };
        }
    }
    // 💡 2. MADDE: Akıllı Harf İpucu Sistemi
    function revealLetterHint() {
        const q = currentQuestions[currentIndex];
        const correctAnswer = (q.type === 'sentence' ? q.answer : q.lv);
        const inputField = document.getElementById("answer-input");

        if (hintCount < correctAnswer.length) {
            hintCount++;
            inputField.value = correctAnswer.substring(0, hintCount);
            inputField.focus();
        }
    }

    function generateOptions(correctQuestion) {
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        let pool = vocabularyDatabase.filter(item => item.type === 'word' && item.lv !== correctQuestion.lv);
        pool.sort(() => Math.random() - 0.5);
        let choices = pool.slice(0, 3).map(item => item.lv);
        choices.push(correctQuestion.lv);
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choiceText => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = choiceText;
            btn.onclick = () => verifyAnswer(choiceText, correctQuestion);
            optionsContainer.appendChild(btn);
        });
    }

    function cleanAksan(str) {
        return str.replace(/ā/g, 'a').replace(/č/g, 'c').replace(/ē/g, 'e')
                  .replace(/ģ/g, 'g').replace(/ī/g, 'i').replace(/ķ/g, 'k')
                  .replace(/ļ/g, 'l').replace(/ņ/g, 'n').replace(/š/g, 's')
                  .replace(/ū/g, 'u').replace(/ž/g, 'z');
    }

    // Sepete Yanlış Soru Ekleme/Çıkarma Yardımcısı
    function handleErrorsPool(question, isCorrect) {
        let errorPool = JSON.parse(localStorage.getItem('ml_errors') || '[]');
        if (isCorrect) {
            // Eğer doğru bildiyse ve hata havuzundaysa sil
            errorPool = errorPool.filter(item => !(item.lv === question.lv && item.topic === question.topic));
        } else {
            // Yanlış bildiyse ve havuzda yoksa ekle
            const exist = errorPool.some(item => item.lv === question.lv && item.topic === question.topic);
            if (!exist) errorPool.push(question);
        }
        localStorage.setItem('ml_errors', JSON.stringify(errorPool));
    }

    function verifyAnswer(selected, qObj) {
        const feedbackField = document.getElementById("feedback");
        const card = document.getElementById("main-card");

        if (selected.toLowerCase() === qObj.lv.toLowerCase()) {
            score++; playSound('success');
            feedbackField.className = "feedback success";
            feedbackField.innerText = "Pareizi! (Doğru) 🌟";
            handleErrorsPool(qObj, true);
        } else {
            playSound('error'); card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            feedbackField.className = "feedback error";
            feedbackField.innerText = `Nepareizi! Doğru cevap: ${qObj.lv}`;
            handleErrorsPool(qObj, false);
        }
        currentIndex++; setTimeout(showQuestion, 1600);
    }

    function checkTextAnswer() {
        const q = currentQuestions[currentIndex];
        const userInput = document.getElementById("answer-input").value.trim().toLowerCase();
        const correctAnswer = (q.type === 'sentence' ? q.answer : q.lv).trim().toLowerCase();
        const feedbackField = document.getElementById("feedback");
        const card = document.getElementById("main-card");

        if (userInput === correctAnswer) {
            // Harf ipucu kullandıysa yarım puan, kullanmadıysa tam puan
            score += (hintCount > 0) ? 0.5 : 1;
            playSound('success');
            feedbackField.className = "feedback success";
            feedbackField.innerText = (hintCount > 0) ? "Doğru (İpucu kullandınız 💡)" : "Pareizi! (Doğru) 🌟";
            handleErrorsPool(q, true);
        } else if (cleanAksan(userInput) === cleanAksan(correctAnswer)) {
            // 2. MADDE: Tolerans Kontrolü
            score += (hintCount > 0) ? 0.5 : 1;
            playSound('success');
            feedbackField.className = "feedback warning";
            feedbackField.innerText = `Neredeyse doğru! İşaretlere dikkat: ${correctAnswer} ✍️`;
            handleErrorsPool(q, true);
        } else {
            playSound('error'); card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            feedbackField.className = "feedback error";
            feedbackField.innerText = `Nepareizi! Doğru cevap: ${correctAnswer}`;
            handleErrorsPool(q, false);
        }

        currentIndex++; setTimeout(showQuestion, 2000);
    }

    function finishQuiz() {
        document.getElementById("quiz-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");
        document.getElementById("score-text").innerText = 
            `${currentQuestions.length} soru içerisinden ${score} puan topladınız!`;

        if (!isErrorMode) {
            const currentScoreString = `${score}/${currentQuestions.length}`;
            const existingRecord = localStorage.getItem(`mani_score_${currentTopicKey}`);
            if (existingRecord) {
                const oldCorrect = parseFloat(existingRecord.split('/')[0]);
                if (score > oldCorrect) localStorage.setItem(`mani_score_${currentTopicKey}`, currentScoreString);
            } else {
                localStorage.setItem(`mani_score_${currentTopicKey}`, currentScoreString);
            }
        }
        
        updateStreak(true); // Test başarıyla bittiğinde seriyi artır
    }

    function exitQuiz() {
        if (confirm("Testten çıkmak istediğinize emin misiniz?")) showSetupScreen();
    }
</script>
